services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: metadata
      POSTGRES_USER: metadata_user
      POSTGRES_PASSWORD: metadata_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadata_user -d metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

  metadata-server:
    build: .
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_CONN_STRING: "host=postgres port=5432 dbname=metadata user=metadata_user password=metadata_pass"
      GRPC_PORT: "50051"
      CACHE_CAPACITY: "10000"
      POOL_SIZE: "20"

volumes:
  pg_data: